name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      # The unit tests only exercise pure modules (metrics.Metrics), which have
      - name: Run unit tests
        working-directory: my_webot_project/controllers
        run: pytest tests/tests.py -v